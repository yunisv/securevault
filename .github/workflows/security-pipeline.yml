name: 🔒 Security Analysis Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:

  # ════════════════════════════════════════════════════════════════
  # Задание 1: Semgrep SAST
  # ════════════════════════════════════════════════════════════════
  semgrep-sast:
    name: 🔍 Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:1.62

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          mkdir -p results
          semgrep scan \
            --config p/android \
            --config p/kotlin \
            --config p/owasp-mobile-top-10 \
            --config .semgrep/custom-rules.yaml \
            --sarif \
            --output results/semgrep.sarif \
            --severity ERROR \
            --error || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('results/semgrep.sarif') != ''
        with:
          sarif_file: results/semgrep.sarif
          category: semgrep-android

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: results/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════
  # Задание 2: Detekt
  # ════════════════════════════════════════════════════════════════
  detekt-analysis:
    name: 🧹 Detekt Kotlin Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Detekt
        run: ./gradlew detekt --continue
        continue-on-error: true

      - name: Upload Detekt SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('app/build/reports/detekt/detekt.sarif') != ''
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif
          category: detekt-kotlin

      - name: Upload Detekt HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════
  # Задание 3: Build APK + MobSF
  # ════════════════════════════════════════════════════════════════
  mobsf-analysis:
    name: 📱 MobSF Static APK Analysis
    runs-on: ubuntu-latest
    needs: [ semgrep-sast ]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Start MobSF Docker container
        run: |
          docker run -d \
            --name mobsf \
            -p 8000:8000 \
            opensecurity/mobile-security-framework-mobsf:latest
          echo "Waiting for MobSF to start..."
          sleep 30

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Run MobSF Analysis
        env:
          MOBSF_URL: "http://localhost:8000"
          MIN_SCORE: "70"
        run: python3 .github/scripts/mobsf_scan.py

      - name: Upload MobSF PDF Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobsf-security-report
          path: mobsf_report.pdf
          retention-days: 30

  # ════════════════════════════════════════════════════════════════
  # Задание 4: Security Unit Tests
  # ════════════════════════════════════════════════════════════════
  security-unit-tests:
    name: ✅ Security Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Security Unit Tests
        run: ./gradlew test --tests "com.securevault.SecurityUnitTest" --info

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Security Test Results
          path: app/build/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: app/build/test-results/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════
  # Summary
  # ════════════════════════════════════════════════════════════════
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [ semgrep-sast, detekt-analysis, mobsf-analysis, security-unit-tests ]
    if: always()

    steps:
      - name: Write Summary
        run: |
          echo "## 🔒 Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Semgrep SAST  | ${{ needs.semgrep-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 Detekt        | ${{ needs.detekt-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 MobSF         | ${{ needs.mobsf-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Unit Tests    | ${{ needs.security-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
